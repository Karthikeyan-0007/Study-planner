<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Student Study Planner</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/tasks.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo-container">
                <i class="fa-solid fa-graduation-cap logo-icon"></i>
                <h1 class="logo-text">StudyTracker</h1>
            </div>
            
            <ul class="nav-links">
                <li>
                    <a href="dashboard.html" class="nav-item">
                        <i class="fa-solid fa-chart-pie"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="subjects.html" class="nav-item">
                        <i class="fa-solid fa-book"></i>
                        <span>Subjects</span>
                    </a>
                </li>
                <li>
                    <a href="tasks.html" class="nav-item active">
                        <i class="fa-solid fa-list-check"></i>
                        <span>Tasks</span>
                    </a>
                </li>
                <li>
                    <a href="exams.html" class="nav-item">
                        <i class="fa-solid fa-calendar-check"></i>
                        <span>Exams</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <button id="theme-toggle" class="theme-toggle">
                    <i class="fa-solid fa-moon"></i>
                    <span>Dark Mode</span>
                </button>
            </div>
            
            <!-- Mobile Toggle -->
            <button class="mobile-menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header Section -->
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="global-search" placeholder="Search tasks...">
                </div>
                
                <div class="header-right">
                    <div class="streak-badge" id="streak-badge">
                        <i class="fa-solid fa-fire streak-icon"></i>
                        <span id="streak-count">0</span> Day Streak
                    </div>
                    <div class="date-display" id="current-date">
                        Mon, Oct 24, 2023
                    </div>
                </div>
            </header>

            <div class="quote-section">
                <p id="motivational-quote">"Success is not final, failure is not fatal: it is the courage to continue that counts."</p>
            </div>

            <!-- Views Container -->
            <div class="views-container">
                <!-- Tasks View -->
                <section id="tasks-view" class="view-section active">
                    <div class="section-header">
                        <h2>Study Tasks</h2>
                        <button class="primary-btn" onclick="openModal('task-modal')">
                            <i class="fa-solid fa-plus"></i> Add Task
                        </button>
                    </div>
                    
                    <div class="task-filters">
                        <select id="filter-subject" class="filter-select">
                            <option value="all">All Subjects</option>
                            <!-- Dynamic options -->
                        </select>
                        <select id="filter-status" class="filter-select">
                            <option value="all">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>

                    <div class="tasks-container">
                        <ul id="tasks-list" class="tasks-list">
                            <!-- Tasks injected here -->
                        </ul>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="task-modal-title">Add New Task</h3>
                <button class="close-modal" onclick="closeModal('task-modal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-title">Task Description</label>
                    <input type="text" id="task-title" required placeholder="e.g., Read Chapter 5">
                </div>
                <div class="form-group">
                    <label for="task-subject">Subject</label>
                    <select id="task-subject" required>
                        <option value="" disabled selected>Select Subject</option>
                        <!-- Dynamic options -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-due">Due Date</label>
                    <input type="date" id="task-due" required>
                </div>
                <button type="submit" class="submit-btn">Save Task</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/storage.js"></script>
    <script src="../js/streak.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/tasks.js"></script>
</body>
</html>
